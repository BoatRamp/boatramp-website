// boatramp deploy + routing config for the boatramp.dev marketing site.
// Read by `boatramp sync`, `build`, and `validate`. RON format.
//
// The site is served BY boatramp itself (dogfooding): a small build assembles a
// static `dist/` (hand-authored HTML/CSS + a Dioxus WASM island + self-hosted
// fonts), then `boatramp sync` publishes it as an atomic, content-addressed
// deployment. See planning/tech-and-deploy.md.
(
    // The token is supplied out-of-band as BOATRAMP_TOKEN (a scoped publisher
    // token for the `www` site), never committed here.
    publish: (
        server: "https://boatramp.dev",
        site: "www",
    ),

    // `boatramp sync --build` runs this, then publishes `dist`.
    build: (
        command: "just build",
        output: "dist",
    ),

    routing: (
        index: ["index.html"],
        clean_urls: true,
        trailing_slash: Preserve,
        error_documents: { 404: "/404.html" },

        rewrites: [
            // Make the hero one-liner real: `curl -sSf boatramp.dev/launch | sh`
            // serves the actual installer we ship at /install.sh (internal, 200).
            (from: "/launch", to: "/install.sh", status: 200),
        ],

        headers: [
            (matches: "/**", set: {
                "X-Content-Type-Options": "nosniff",
                "X-Frame-Options": "DENY",
                "Referrer-Policy": "strict-origin-when-cross-origin",
            }),
            // Self-hosted fonts are content-stable → cache hard.
            (matches: "/fonts/**", set: {
                "Cache-Control": "public, max-age=31536000, immutable",
            }),
            // The install script is served as plain text so `curl | sh` is happy.
            (matches: "/install.sh", set: { "Content-Type": "text/x-shellscript; charset=utf-8" }),
        ],

        cache: ( default: "public, max-age=0, must-revalidate" ),

        mime_overrides: { ".wasm": "application/wasm" },
    ),
)
